<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradiente de fundo -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Padrão geométrico de fundo -->
  <circle cx="150" cy="100" r="80" fill="#60A5FA" opacity="0.1"/>
  <circle cx="1050" cy="530" r="120" fill="#60A5FA" opacity="0.1"/>
  
  <!-- Ícone de rede neural/IA (esquerda) -->
  <g transform="translate(100, 150)">
    <!-- Nós da rede -->
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="60" cy="-40" r="8" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="60" cy="40" r="8" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="120" cy="0" r="8" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Linhas conectando -->
    <line x1="0" y1="0" x2="60" y2="-40" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="60" y2="40" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <line x1="60" y1="-40" x2="120" y2="0" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <line x1="60" y1="40" x2="120" y2="0" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Ícone de brain/cérebro (direita) -->
  <g transform="translate(1000, 150)">
    <!-- Ondas -->
    <path d="M -50,-20 Q -30,-40 -10,-20" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.8"/>
    <path d="M -40,-10 Q -20,-30 0,-10" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M -30,10 Q -10,-10 10,10" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.6"/>
    
    <!-- Círculo central -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- Texto principal -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    Portal IA 2025
  </text>
  
  <!-- Subtítulo -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="40" fill="#FFFFFF" text-anchor="middle" opacity="0.95">
    O Futuro da Inteligência Artificial
  </text>
  
  <!-- Linha decorativa -->
  <line x1="250" y1="410" x2="950" y2="410" stroke="#60A5FA" stroke-width="3" opacity="0.6"/>
  
  <!-- Ícones pequenos no rodapé -->
  <g transform="translate(400, 500)">
    <!-- Ícone 1: Código -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" opacity="0.8">{"<>"}</text>
  </g>
  
  <g transform="translate(600, 500)">
    <!-- Ícone 2: Símbolo de IA -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF" opacity="0.8"/>
    <line x1="-12" y1="0" x2="-6" y2="0" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <line x1="6" y1="0" x2="12" y2="0" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
  </g>
  
  <g transform="translate(800, 500)">
    <!-- Ícone 3: Inovação -->
    <path d="M -8,-8 L 0,-12 L 8,-8 L 8,8 L -8,8 Z" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF" opacity="0.8"/>
  </g>
</svg>